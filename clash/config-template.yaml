# ========================================
# Clash 数据科学完整配置模板
# ========================================
# 使用说明：
# 1. 复制此文件到你的 Clash 配置目录
# 2. 修改 proxies 和 proxy-groups 部分为你自己的代理
# 3. 将 "你的代理组名" 替换为你实际的代理组名称
# 4. 重启 Clash
# ========================================

# ----------------------------------------
# 代理节点配置（请修改为你自己的代理）
# ----------------------------------------
proxies:
  # 示例配置，请替换为你的实际代理
  - name: "你的代理1"
    type: vmess
    server: your-server.com
    port: 443
    uuid: your-uuid
    alterId: 0
    cipher: auto
    tls: true
    network: ws
    ws-path: /path
    ws-headers:
      Host: your-host.com

# ----------------------------------------
# 代理组配置（请修改为你自己的配置）
# ----------------------------------------
proxy-groups:
  - name: "你的代理组名"
    type: select
    proxies:
      - "你的代理1"
      # 添加更多你的代理...

  - name: DIRECT
    type: select
    proxies:
      - DIRECT

  - name: REJECT
    type: select
    proxies:
      - REJECT

# ----------------------------------------
# 规则配置（数据科学专用）
# ----------------------------------------
rules:
  # ======================================
  # GitHub 相关
  # ======================================
  - DOMAIN-SUFFIX,github.com,你的代理组名
  - DOMAIN-SUFFIX,githubusercontent.com,你的代理组名
  - DOMAIN-SUFFIX,githubassets.com,你的代理组名
  - DOMAIN-SUFFIX,github.io,你的代理组名
  - DOMAIN-SUFFIX,gist.github.com,你的代理组名
  - DOMAIN-SUFFIX,api.github.com,你的代理组名
