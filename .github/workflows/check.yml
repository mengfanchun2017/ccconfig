name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax check
        run: |
          find . -name "*.sh" -not -path "./.git/*" -print0 | xargs -0 -I{} bash -n {}
  deps:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: deps check
        run: bash deps-check.sh
